name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run verify
      - run: npm publish --workspace @proveit/verification-contract --access public --provenance
      - run: npm publish --workspace @proveit/open-verifier --access public --provenance
